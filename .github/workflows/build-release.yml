name: Build Release Packages

on:
  workflow_dispatch:
    inputs:
      source_han_sans_release:
        description: Source Han Sans release tag, or latest
        default: latest
        required: true
      pretendard_release:
        description: Pretendard release tag, or latest
        default: latest
        required: true
      release_tag:
        description: Optional GitHub release tag for draft release creation
        default: ""
        required: false
      create_draft_release:
        description: Create a draft GitHub Release with the ZIP files
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build release ZIP files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm ci

      - name: Download upstream source fonts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -B tools/download_upstreams.py \
            --source-han-sans-release "${{ inputs.source_han_sans_release }}" \
            --pretendard-release "${{ inputs.pretendard_release }}"

      - name: Build fonts
        run: bash ./script/build_fonts.sh linux 12

      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusHanSans-ZIP
          path: release/ZIP/*.zip
          if-no-files-found: error

      - name: Create draft release
        if: inputs.create_draft_release && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.release_tag }}" release/ZIP/*.zip \
            --draft \
            --title "Nexus Han Sans ${{ inputs.release_tag }}" \
            --notes "Draft release generated by GitHub Actions."
